name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  rust-only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone gidy-core
        run: git clone https://github.com/yokeay/gidy-core.git ../gidy-core

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Build (Rust libs + CLI)
        run: cargo build --release -p gidy-client-core -p gidy-client-cli

      - name: Test
        run: cargo test -p gidy-client-core -p gidy-client-cli

      - name: Lint
        run: cargo clippy -p gidy-client-core -p gidy-client-cli -- -D warnings

  gui-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone gidy-core
        run: git clone https://github.com/yokeay/gidy-core.git ../gidy-core

      - name: Install system deps (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libgtk-3-dev libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev librsvg2-dev
          sudo apt-get install -y libappindicator3-dev || true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gidy-client-gui/package-lock.json

      - name: npm ci
        run: npm ci
        working-directory: gidy-client-gui

      - name: Build frontend
        run: npm run build
        working-directory: gidy-client-gui

      - name: Cargo build GUI
        run: cargo build --release -p gidy-client-gui

      - name: Cargo clippy GUI
        run: cargo clippy -p gidy-client-gui -- -D warnings
