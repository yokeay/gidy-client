name: Android

on:
  push:
    branches: [main, dev, "feat/android-**"]
    paths:
      - "gidy-android/**"
      - ".github/workflows/android.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "gidy-android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gidy-android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            gidy-android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('gidy-android/**/*.gradle*', 'gidy-android/gradle/libs.versions.toml', 'gidy-android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.10.2 --distribution-type bin
          fi
          chmod +x gradlew

      - name: Lint
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gidy-android-debug
          path: gidy-android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gidy-android-lint-report
          path: gidy-android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 14
