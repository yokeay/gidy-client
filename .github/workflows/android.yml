name: Android

on:
  push:
    branches: [main, dev, "feat/android-**"]
    paths:
      - "gidy-android/**"
      - ".github/workflows/android.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "gidy-android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gidy-android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            gidy-android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('gidy-android/**/*.gradle*', 'gidy-android/gradle/libs.versions.toml', 'gidy-android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.10.2 --distribution-type bin
          fi
          chmod +x gradlew

      - name: Lint
        id: lint
        continue-on-error: true
        run: ./gradlew :app:lintDebug --stacktrace --info

      - name: Assemble debug APK
        id: assemble
        continue-on-error: true
        run: ./gradlew :app:assembleDebug --stacktrace --info 2>&1 | tee gidy-android/build-log.txt

      - name: Tail build log on failure
        if: steps.assemble.outcome == 'failure'
        run: |
          echo "=========== LAST 400 LINES OF BUILD LOG ==========="
          tail -n 400 gidy-android/build-log.txt || true
          echo "=========== GRADLE PROBLEMS REPORT ==========="
          find gidy-android -path '*/build/reports/problems*' -type f | while read f; do
            echo "--- $f ---"; cat "$f"
          done
          echo "=========== COMPILE ERRORS ==========="
          grep -nE "e: |error:|FAILED|What went wrong|Caused by" gidy-android/build-log.txt | head -100 || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gidy-android-build-log
          path: |
            gidy-android/build-log.txt
            gidy-android/app/build/reports/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload debug APK
        if: steps.assemble.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: gidy-android-debug
          path: gidy-android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gidy-android-lint-report
          path: gidy-android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 14

      - name: Fail job if assemble failed
        if: steps.assemble.outcome == 'failure'
        run: exit 1
