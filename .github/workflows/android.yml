name: Android

on:
  push:
    branches: [main, dev, "feat/android-**"]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
  pull_request:
    branches: [main, dev]
    paths:
      - "gidy-android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: write  # for creating GitHub Release on tag push

jobs:
  lint:
    if: github.ref_type != 'tag'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gidy-android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            gidy-android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('gidy-android/**/*.gradle*', 'gidy-android/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.10.2 --distribution-type bin
          fi
          chmod +x gradlew

      - name: Lint
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gidy-android-lint-report
          path: gidy-android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 14

  release:
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gidy-android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            gidy-android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('gidy-android/**/*.gradle*', 'gidy-android/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.10.2 --distribution-type bin
          fi
          chmod +x gradlew

      - name: Decode keystore from secret
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is missing"
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > release.p12
          ls -la release.p12

      - name: Assemble release APK
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/gidy-android/release.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Locate release APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name '*.apk' -print -quit)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No release APK found"
            find app/build -type f -name '*.apk' || true
            exit 1
          fi
          ABS_PATH="$(pwd)/$APK_PATH"
          APK_NAME="gidy-client-${{ github.ref_name }}.apk"
          cp "$ABS_PATH" "/tmp/$APK_NAME"
          echo "path=/tmp/$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "name=$APK_NAME" >> "$GITHUB_OUTPUT"
          ls -la "/tmp/$APK_NAME"

      - name: Clean up keystore
        if: always()
        run: rm -f release.p12

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true

      - name: Push release notification to Feishu
        if: always()
        env:
          FEISHU_WEBHOOK: https://open.feishu.cn/open-apis/bot/v2/hook/9f51596d-b832-4f42-a216-9752044c48b9
          TAG: ${{ github.ref_name }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          STATUS: ${{ job.status }}
        run: python3 ../.github/workflows/scripts/push_release.py
