name: Android

on:
  push:
    branches: [main, dev, "feat/android-**"]
    paths:
      - "gidy-android/**"
      - ".github/workflows/android.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "gidy-android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gidy-android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            gidy-android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('gidy-android/**/*.gradle*', 'gidy-android/gradle/libs.versions.toml', 'gidy-android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.10.2 --distribution-type bin
          fi
          chmod +x gradlew

      - name: Lint
        id: lint
        continue-on-error: true
        run: ./gradlew :app:lintDebug --stacktrace --info 2>&1 | tee lint-log.txt

      - name: Assemble debug APK
        id: assemble
        continue-on-error: true
        run: ./gradlew :app:assembleDebug --stacktrace --info 2>&1 | tee build-log.txt

      - name: Show build log tail on failure
        if: steps.assemble.outcome == 'failure'
        run: |
          echo "::group::LAST 500 LINES OF BUILD LOG"
          tail -n 500 build-log.txt || true
          echo "::endgroup::"
          echo "::group::COMPILE ERRORS GREP"
          grep -nE "e: |error:|FAILED|What went wrong|Caused by|Unresolved reference|cannot find symbol" build-log.txt | head -200 || true
          echo "::endgroup::"
          echo "::group::PROBLEMS REPORT"
          find . -path '*/build/reports/problems*' -type f -print -exec cat {} \; || true
          echo "::endgroup::"

      - name: Push build error tail to Feishu
        if: steps.assemble.outcome == 'failure'
        env:
          FEISHU_WEBHOOK: https://open.feishu.cn/open-apis/bot/v2/hook/9f51596d-b832-4f42-a216-9752044c48b9
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          ERR=$(grep -nE "e: |error:|FAILED|What went wrong|Caused by|Unresolved reference|cannot find symbol" build-log.txt | head -60 || true)
          TAIL=$(tail -n 150 build-log.txt || true)
          export ERR TAIL
          python3 ../.github/workflows/scripts/push_build_failure.py

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gidy-android-build-log
          path: |
            gidy-android/build-log.txt
            gidy-android/lint-log.txt
            gidy-android/app/build/reports/**
          if-no-files-found: warn
          retention-days: 14

      - name: List APK outputs (diagnostic)
        if: always()
        run: |
          echo "::group::find app/build for *.apk"
          find app/build -type f -name '*.apk' -print 2>/dev/null || true
          echo "::endgroup::"
          echo "::group::ls -la app/build/outputs/apk (if exists)"
          ls -laR app/build/outputs/apk 2>/dev/null || echo "(no apk outputs dir)"
          echo "::endgroup::"

      - name: Upload debug APK
        if: steps.assemble.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: gidy-android-debug
          path: gidy-android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gidy-android-lint-report
          path: gidy-android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 14

      - name: Fail job if assemble failed
        if: steps.assemble.outcome == 'failure'
        run: exit 1
