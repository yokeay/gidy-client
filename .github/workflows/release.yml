name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

# ──────────────────────────────────────────────────────────────────────
#  Release pipeline
#    Linux:   GUI (AppImage + deb) + CLI
#    macOS:   GUI (universal dmg) + CLI (arm64)
#    Windows: GUI (NSIS exe + MSI)    ← 只打包 GUI，不要 CLI
# ──────────────────────────────────────────────────────────────────────

jobs:
  # ═══════════════════════  CLI (Linux + macOS only)  ══════════════════

  cli-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone gidy-core
        run: git clone https://github.com/yokeay/gidy-core.git ../gidy-core
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI
        run: cargo build --release -p gidy-client-cli
      - name: Package
        run: |
          cd target/release
          tar czf ../../gidy-client-cli-linux-x86_64.tar.gz gidy-client
          sha256sum ../../gidy-client-cli-linux-x86_64.tar.gz > ../../gidy-client-cli-linux-x86_64.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: cli-linux-x86_64
          path: |
            gidy-client-cli-linux-x86_64.tar.gz
            gidy-client-cli-linux-x86_64.tar.gz.sha256

  cli-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone gidy-core
        run: git clone https://github.com/yokeay/gidy-core.git ../gidy-core
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI
        run: cargo build --release -p gidy-client-cli --target aarch64-apple-darwin
      - name: Package
        run: |
          cd target/aarch64-apple-darwin/release
          tar czf ../../../gidy-client-cli-macos-arm64.tar.gz gidy-client
          shasum -a 256 ../../../gidy-client-cli-macos-arm64.tar.gz > ../../../gidy-client-cli-macos-arm64.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: cli-macos-arm64
          path: |
            gidy-client-cli-macos-arm64.tar.gz
            gidy-client-cli-macos-arm64.tar.gz.sha256

  # ═══════════════════════  GUI (all 3 platforms)  ════════════════════

  gui-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone gidy-core
        run: git clone https://github.com/yokeay/gidy-core.git ../gidy-core
      - name: Install system deps (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libgtk-3-dev libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev librsvg2-dev
          sudo apt-get install -y libappindicator3-dev || true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gidy-client-gui/package-lock.json
      - name: npm ci
        run: npm ci
        working-directory: gidy-client-gui
      - name: Build frontend
        run: npm run build
        working-directory: gidy-client-gui
      - name: Fix index.html asset paths
        run: |
          sed -i 's|href="/|href="./|g; s|src="/|src="./|g' gidy-client-gui/dist/index.html
          sed -i 's| crossorigin||g' gidy-client-gui/dist/index.html
      - name: Build GUI (AppImage + deb)
        run: npx tauri build --bundles appimage,deb
        working-directory: gidy-client-gui
      - name: Collect & hash GUI bundles
        shell: bash
        run: |
          mkdir -p /tmp/gui-linux
          find target/release/bundle -type f \( -name "*.AppImage" -o -name "*.deb" \) 2>/dev/null | while read f; do
            base=$(basename "$f")
            cp "$f" /tmp/gui-linux/
            sha256sum "/tmp/gui-linux/$base" > "/tmp/gui-linux/$base.sha256"
          done
          find gidy-client-gui/src-tauri/target/release/bundle -type f \( -name "*.AppImage" -o -name "*.deb" \) 2>/dev/null | while read f; do
            base=$(basename "$f")
            cp "$f" /tmp/gui-linux/
            sha256sum "/tmp/gui-linux/$base" > "/tmp/gui-linux/$base.sha256"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: gui-linux
          path: /tmp/gui-linux/*

  gui-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone gidy-core
        run: git clone https://github.com/yokeay/gidy-core.git ../gidy-core
        shell: bash
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gidy-client-gui/package-lock.json
      - name: Install WiX Toolset (for MSI)
        run: |
          choco install wixtoolset -y
          echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" >> $GITHUB_PATH
        shell: bash
      - name: npm ci
        run: npm ci
        working-directory: gidy-client-gui
      - name: Build frontend
        run: npm run build
        working-directory: gidy-client-gui
      - name: Fix index.html asset paths
        shell: bash
        run: |
          sed -i 's|href="/|href="./|g; s|src="/|src="./|g' gidy-client-gui/dist/index.html
          sed -i 's| crossorigin||g' gidy-client-gui/dist/index.html
      - name: Build GUI (NSIS + MSI)
        run: npx tauri build --bundles nsis,msi
        working-directory: gidy-client-gui
        shell: bash

      - name: Find all exe/msi in workspace
        shell: bash
        run: |
          echo "=== ALL .exe files ==="
          find . -name "*.exe" -not -path "*/node_modules/*" -not -path "*/.cargo/*" 2>/dev/null
          echo "=== ALL .msi files ==="
          find . -name "*.msi" 2>/dev/null
          echo "=== target/release/bundle ls -R ==="
          ls -R target/release/bundle/ 2>/dev/null || echo "(missing)"
          echo "=== gidy-client-gui/src-tauri/target/release/bundle ls -R ==="
          ls -R gidy-client-gui/src-tauri/target/release/bundle/ 2>/dev/null || echo "(missing)"

      - name: Collect & hash installers
        shell: bash
        run: |
          mkdir -p /tmp/gui-windows
          find . -path "*/bundle/nsis/*.exe" -o -path "*/bundle/msi/*.msi" 2>/dev/null | while read f; do
            base=$(basename "$f")
            cp "$f" /tmp/gui-windows/
            sha256sum "/tmp/gui-windows/$base" > "/tmp/gui-windows/$base.sha256"
            echo "collected: $base"
          done
          echo "=== /tmp/gui-windows ==="
          ls -la /tmp/gui-windows/
      - uses: actions/upload-artifact@v4
        with:
          name: gui-windows
          path: /tmp/gui-windows/*

  gui-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone gidy-core
        run: git clone https://github.com/yokeay/gidy-core.git ../gidy-core
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gidy-client-gui/package-lock.json
      - name: npm ci
        run: npm ci
        working-directory: gidy-client-gui
      - name: Build frontend
        run: npm run build
        working-directory: gidy-client-gui
      - name: Fix index.html asset paths
        run: |
          sed -i '' 's|href="/|href="./|g; s|src="/|src="./|g' gidy-client-gui/dist/index.html
          sed -i '' 's| crossorigin||g' gidy-client-gui/dist/index.html
      - name: Build GUI (universal – dmg)
        run: npx tauri build --target universal-apple-darwin --bundles dmg
        working-directory: gidy-client-gui
      - name: Collect & hash bundles
        run: |
          mkdir -p /tmp/gui-macos
          find target/universal-apple-darwin/release/bundle -type f \( -name "*.dmg" -o -name "*.app" \) 2>/dev/null | while read f; do
            base=$(basename "$f")
            if [ -d "$f" ]; then
              (cd "$(dirname "$f")" && zip -r /tmp/gui-macos/"$base".zip "$base")
              shasum -a 256 /tmp/gui-macos/"$base".zip > /tmp/gui-macos/"$base".zip.sha256
            else
              cp "$f" /tmp/gui-macos/
              shasum -a 256 /tmp/gui-macos/"$base" > /tmp/gui-macos/"$base".sha256
            fi
          done
          find gidy-client-gui/src-tauri/target/universal-apple-darwin/release/bundle -type f \( -name "*.dmg" -o -name "*.app" \) 2>/dev/null | while read f; do
            base=$(basename "$f")
            if [ -d "$f" ]; then
              (cd "$(dirname "$f")" && zip -r /tmp/gui-macos/"$base".zip "$base")
              shasum -a 256 /tmp/gui-macos/"$base".zip > /tmp/gui-macos/"$base".zip.sha256
            else
              cp "$f" /tmp/gui-macos/
              shasum -a 256 /tmp/gui-macos/"$base" > /tmp/gui-macos/"$base".sha256
            fi
          done
      - uses: actions/upload-artifact@v4
        with:
          name: gui-macos
          path: /tmp/gui-macos/*

  # ═══════════════════════  Release  ══════════════════════════════════

  release:
    needs:
      - cli-linux
      - cli-macos
      - gui-linux
      - gui-windows
      - gui-macos
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/cli-linux-x86_64/*
            artifacts/cli-macos-arm64/*
            artifacts/gui-linux/*
            artifacts/gui-windows/*
            artifacts/gui-macos/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
