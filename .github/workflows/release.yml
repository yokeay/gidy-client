name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Clone gidy-core
        run: git clone https://github.com/yokeay/gidy-core.git ../gidy-core

      - name: Install system deps (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libgtk-3-dev libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev librsvg2-dev
          sudo apt-get install -y libappindicator3-dev || true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gidy-client-gui/package-lock.json

      - name: npm ci
        run: npm ci
        working-directory: gidy-client-gui

      - name: Build frontend
        run: npm run build
        working-directory: gidy-client-gui

      - name: Verify & fix index.html asset paths (must be relative, no crossorigin)
        run: |
          echo "=== dist/index.html before fix ==="
          cat gidy-client-gui/dist/index.html
          # Ensure relative paths
          sed -i 's|href="/|href="./|g; s|src="/|src="./|g' gidy-client-gui/dist/index.html
          # Remove crossorigin attribute (causes CORS block under tauri:// protocol)
          sed -i 's| crossorigin||g' gidy-client-gui/dist/index.html
          echo "=== after fix ==="
          cat gidy-client-gui/dist/index.html

      - name: Build GUI (Tauri bundle – AppImage + deb)
        run: npx tauri build --bundles appimage,deb
        working-directory: gidy-client-gui

      - name: Build CLI
        run: cargo build --release -p gidy-client-cli

      - name: Package CLI
        run: |
          cd target/release
          tar czf ../../gidy-client-cli-linux-x86_64.tar.gz gidy-client
          sha256sum ../../gidy-client-cli-linux-x86_64.tar.gz > ../../gidy-client-cli-linux-x86_64.tar.gz.sha256

      - name: Collect GUI bundles
        run: |
          find target/release/bundle -type f \( -name "*.AppImage" -o -name "*.deb" \) | while read f; do
            cp "$f" .
            sha256sum "$(basename $f)" > "$(basename $f).sha256"
          done
        shell: bash

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gidy-client-cli-linux-x86_64.tar.gz
            gidy-client-cli-linux-x86_64.tar.gz.sha256
            *.AppImage
            *.deb
            *.AppImage.sha256
            *.deb.sha256
          generate_release_notes: true

  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Clone gidy-core
        run: git clone https://github.com/yokeay/gidy-core.git ../gidy-core
        shell: bash

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gidy-client-gui/package-lock.json

      - name: Install WiX Toolset (for MSI)
        run: |
          choco install wixtoolset -y
          echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" >> $GITHUB_PATH
        shell: bash

      - name: npm ci
        run: npm ci
        working-directory: gidy-client-gui

      - name: Build frontend
        run: npm run build
        working-directory: gidy-client-gui

      - name: Verify & fix index.html asset paths (must be relative, no crossorigin)
        shell: bash
        run: |
          echo "=== dist/index.html before fix ==="
          cat gidy-client-gui/dist/index.html
          # Ensure relative paths
          sed -i 's|href="/|href="./|g; s|src="/|src="./|g' gidy-client-gui/dist/index.html
          # Remove crossorigin attribute (causes CORS block under tauri:// protocol)
          sed -i 's| crossorigin||g' gidy-client-gui/dist/index.html
          echo "=== after fix ==="
          cat gidy-client-gui/dist/index.html

      - name: Build GUI (Tauri bundle – NSIS + MSI)
        run: npx tauri build --bundles nsis,msi
        working-directory: gidy-client-gui
        shell: bash

      - name: Build CLI
        run: cargo build --release -p gidy-client-cli

      - name: Collect installers
        run: |
          find target/release/bundle -type f \( -name "*.exe" -o -name "*.msi" \) | while read f; do
            cp "$f" .
            sha256sum "$(basename $f)" > "$(basename $f).sha256"
          done
        shell: bash

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.exe
            *.msi
            *.sha256
          generate_release_notes: true
