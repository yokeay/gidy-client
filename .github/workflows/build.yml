name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone gidy-core
        run: git clone https://github.com/yokeay/gidy-core.git ../gidy-core

      - uses: dtolnay/rust-toolchain@stable
      - name: Test gidy-client-core
        run: cargo test -p gidy-client-core

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: gidy-client.exe
            name: gidy-client-windows-x86_64
            package: gidy-client-cli
          - os: ubuntu-latest
            artifact: gidy-client
            name: gidy-client-linux-x86_64
            package: gidy-client-cli
          - os: windows-latest
            artifact: gidy-client-gui.exe
            name: gidy-client-gui-windows-x86_64
            package: gidy-client-gui
            frontend: true
          - os: ubuntu-latest
            artifact: gidy-client-gui
            name: gidy-client-gui-linux-x86_64
            package: gidy-client-gui
            frontend: true
            system_deps: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Clone gidy-core
        run: git clone https://github.com/yokeay/gidy-core.git ../gidy-core

      - name: Install system deps (Linux Tauri)
        if: matrix.system_deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libgtk-3-dev libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev librsvg2-dev
          sudo apt-get install -y libappindicator3-dev || true

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        if: matrix.frontend
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gidy-client-gui/package-lock.json

      - name: npm ci
        if: matrix.frontend
        run: npm ci
        working-directory: gidy-client-gui

      - name: Build frontend
        if: matrix.frontend
        run: npm run build
        working-directory: gidy-client-gui

      - name: Build
        run: cargo build --release -p ${{ matrix.package }}

      - name: Upload artifact (CLI)
        if: '!matrix.frontend'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: target/release/${{ matrix.artifact }}

      - name: Upload artifact (GUI)
        if: matrix.frontend
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: target/release/${{ matrix.artifact }}

  release:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: version
        run: |
          VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "tag=v$VER" >> $GITHUB_OUTPUT
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: |
            artifacts/gidy-client-windows-x86_64/gidy-client.exe
            artifacts/gidy-client-linux-x86_64/gidy-client
            artifacts/gidy-client-gui-windows-x86_64/gidy-client-gui.exe
            artifacts/gidy-client-gui-linux-x86_64/gidy-client-gui
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
