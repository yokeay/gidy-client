name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── CLI build matrix ────────────────────────────────────────────────
  cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: gidy-client
            name: cli-linux-x86_64
          - os: windows-latest
            artifact: gidy-client.exe
            name: cli-windows-x86_64
          - os: macos-13
            artifact: gidy-client
            name: cli-macos-x86_64
            target: x86_64-apple-darwin
          - os: macos-latest
            artifact: gidy-client
            name: cli-macos-arm64
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Clone gidy-core
        run: git clone https://github.com/yokeay/gidy-core.git ../gidy-core
        shell: bash

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target || '' }}
      - uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --release -p gidy-client-cli ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: target/${{ matrix.target || 'release' }}/release/${{ matrix.artifact }}

  # ── GUI build matrix ───────────────────────────────────────────────
  gui:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: gui-linux
            system_deps: true
          - os: windows-latest
            name: gui-windows
          - os: macos-latest
            name: gui-macos
            target: universal-apple-darwin
      runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Clone gidy-core
        run: git clone https://github.com/yokeay/gidy-core.git ../gidy-core
        shell: bash

      - name: Install system deps (Linux Tauri)
        if: matrix.system_deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libgtk-3-dev libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev librsvg2-dev
          sudo apt-get install -y libappindicator3-dev || true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gidy-client-gui/package-lock.json

      - name: npm ci
        run: npm ci
        working-directory: gidy-client-gui
      - name: Build frontend
        run: npm run build
        working-directory: gidy-client-gui

      - name: Fix index.html asset paths (Linux/Windows)
        if: runner.os != 'macOS'
        shell: bash
        run: |
          sed -i 's|href="/|href="./|g; s|src="/|src="./|g' gidy-client-gui/dist/index.html
          sed -i 's| crossorigin||g' gidy-client-gui/dist/index.html

      - name: Fix index.html asset paths (macOS)
        if: runner.os == 'macOS'
        run: |
          sed -i '' 's|href="/|href="./|g; s|src="/|src="./|g' gidy-client-gui/dist/index.html
          sed -i '' 's| crossorigin||g' gidy-client-gui/dist/index.html

      - name: Build GUI (Tauri – no bundle)
        run: npx tauri build --no-bundle ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
        working-directory: gidy-client-gui
        shell: bash

      - name: Upload GUI artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: target/release/gidy-client-gui

      - name: Upload GUI artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: target/release/gidy-client-gui.exe

      - name: Upload GUI artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: target/${{ matrix.target }}/release/gidy-client-gui

  # ── Release (only on push to main or manual) ────────────────────────
  release:
    needs: [cli, gui]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: version
        run: |
          VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "tag=v$VER" >> $GITHUB_OUTPUT
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: |
            artifacts/cli-linux-x86_64/*
            artifacts/cli-windows-x86_64/*
            artifacts/cli-macos-x86_64/*
            artifacts/cli-macos-arm64/*
            artifacts/gui-linux/*
            artifacts/gui-windows/*
            artifacts/gui-macos/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
