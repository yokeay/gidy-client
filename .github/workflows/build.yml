name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone gidy-core
        run: git clone https://github.com/yokeay/gidy-core.git ../gidy-core

      - uses: dtolnay/rust-toolchain@stable
      - name: Test gidy-client-core
        run: cargo test -p gidy-client-core

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: gidy-client.exe
            name: gidy-client-windows-x86_64
            package: gidy-client-cli
          - os: ubuntu-latest
            artifact: gidy-client
            name: gidy-client-linux-x86_64
            package: gidy-client-cli
          - os: windows-latest
            artifact: gidy-client-gui.exe
            name: gidy-client-gui-windows-x86_64
            package: gidy-client-gui
          - os: ubuntu-latest
            artifact: gidy-client-gui
            name: gidy-client-gui-linux-x86_64
            package: gidy-client-gui
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Clone gidy-core
        run: git clone https://github.com/yokeay/gidy-core.git ../gidy-core

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release -p ${{ matrix.package }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: target/release/${{ matrix.artifact }}

  release:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: version
        run: |
          VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "tag=v$VER" >> $GITHUB_OUTPUT
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: |
            artifacts/gidy-client-windows-x86_64/gidy-client.exe
            artifacts/gidy-client-linux-x86_64/gidy-client
            artifacts/gidy-client-gui-windows-x86_64/gidy-client-gui.exe
            artifacts/gidy-client-gui-linux-x86_64/gidy-client-gui
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
