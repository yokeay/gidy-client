name: Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Install mingw-w64
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mingw-w64
      - name: Build gidy-client (Windows)
        run: cargo build --release -p gidy-client-cli --target x86_64-pc-windows-gnu
      - name: Upload Windows client
        uses: actions/upload-artifact@v4
        with:
          name: gidy-client-windows-x86_64
          path: target/x86_64-pc-windows-gnu/release/gidy-client.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build gidy-client (Linux)
        run: cargo build --release -p gidy-client-cli
      - name: Upload Linux client
        uses: actions/upload-artifact@v4
        with:
          name: gidy-client-linux-x86_64
          path: target/release/gidy-client

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test gidy-client-core
        run: cargo test -p gidy-client-core
